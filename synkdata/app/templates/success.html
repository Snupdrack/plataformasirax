<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitud recibida — SynkData</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f7fa;
            color: #1f2937;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
        }
        .check {
            width: 80px;
            height: 80px;
            background: #00c2a8;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            color: white;
            font-size: 3rem;
        }
        h1 { color: #0a4d8c; margin-top: 0; }
        a {
            display: inline-block;
            margin-top: 1.5rem;
            background: #0a4d8c;
            color: white;
            text-decoration: none;
            padding: 0.7rem 1.5rem;
            border-radius: 4px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="check">✓</div>
        <h1>¡Solicitud recibida!</h1>
        <p>Gracias por su interés en SynkData. Hemos recibido su solicitud
           de acceso y nuestro equipo la revisará en breve.</p>
        <p>Le contactaremos por correo electrónico una vez que la solicitud
           haya sido procesada.</p>
        <a href="/api/v1/">Volver al inicio</a>
    </div>
</body>
</html>
